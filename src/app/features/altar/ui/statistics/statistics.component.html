<section class="altar-stats" [attr.aria-label]="'altar.statistics.label' | transloco">
  <article class="altar-stat">
    <p class="altar-panel-label">{{ 'altar.statistics.total_offerings' | transloco }}</p>
    <p class="altar-stat-value">0</p>
  </article>

  <article class="altar-stat">
    <p class="altar-panel-label">{{ 'altar.statistics.spirit_status' | transloco }}</p>
    <p class="altar-stat-value altar-stat-value-status">{{ 'altar.statistics.status_watching' | transloco }}</p>
  </article>

  <article class="altar-stat">
    <p class="altar-panel-label">{{ 'altar.statistics.blessing_level' | transloco }}</p>
    <p class="altar-stat-value">0%</p>
  </article>
</section>
