<ngKitty-confess />

<div class="sins">
  @for (sin of sinsData; track sin.id) {
    <ngKitty-shrift-item [severity]="sin.severity" [status]="sin.status">
      <p title class="title">{{ sin.text }}</p>
    </ngKitty-shrift-item>
  } @empty {
    <div class="empty">
      <p>{{ 'shrift.empty' | transloco }}</p>
    </div>
  }
</div>
