<ngKitty-confess />

<div class="sins">
  @for (sin of facade.sins(); track sin.uid) {
    <ngKitty-shrift-item [severity]="sin.severity" [status]="sin.status" (clicked)="onDelete(sin.uid)">
      <p title class="title">{{ sin.text }}</p>
    </ngKitty-shrift-item>
  } @empty {
    <div class="empty">
      <p>{{ 'shrift.empty' | transloco }}</p>
    </div>
  }
</div>

@if (facade.isLoading()) {
  <div class="loading">
    <img src="assets/loading.gif" alt="loading" />
  </div>
}
