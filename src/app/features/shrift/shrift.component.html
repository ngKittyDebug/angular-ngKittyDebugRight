<ngKitty-confess />

<div class="sins">
  @for (sin of sinsData; track sin.id) {
    <ngKitty-shrift-item
      [title]="translocoService.getActiveLang() === 'ru' ? sin.text.ru : sin.text.en"
      [severity]="sin.severity"
      [status]="sin.status"
      [severityLabel]="translocoService.getActiveLang() === 'ru' ? sin.severityLabel.ru : sin.severityLabel.en"
      [statusLabel]="translocoService.getActiveLang() === 'ru' ? sin.statusLabel.ru : sin.statusLabel.en"
    />
  } @empty {
    <div class="empty">
      <p>{{ 'shrift.empty' | transloco }}</p>
    </div>
  }
</div>
