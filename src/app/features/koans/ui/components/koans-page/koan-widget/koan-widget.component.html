@if (loading() && !koan()) {
  <div class="koan-widget" aria-busy="true">
    <span class="koan-widget-label">Коан дня</span>
    <p class="koan-widget-loading" aria-live="polite">Мастер выбирает свиток…</p>
  </div>
} @else if (koan(); as k) {
  <div class="koan-widget" [attr.aria-busy]="loading()">
    <div class="koan-widget-header">
      <span class="koan-widget-label">Коан дня</span>
      <span class="koan-widget-title">№{{ k.number }} — {{ k.title }}</span>
    </div>
    <div class="koan-widget-body">
      @for (seg of k.segments; track $index) {
        @if (seg.type === 'question') {
          <p class="koan-widget-question">{{ seg.text }}</p>
        }
      }
    </div>
    <div class="koan-widget-footer">
      <button tuiButton type="button" appearance="outline" size="s" [disabled]="loading()" (click)="onNext()">
        Следующий коан
      </button>
    </div>
  </div>
}
