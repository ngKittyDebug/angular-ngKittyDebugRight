<a href="#koans-main" class="skip-link">{{ 'koans.skip-link' | transloco }}</a>

<header class="kp-header">
  <div class="kp-search-wrap">
    <svg
      class="kp-search-icon"
      viewBox="0 0 16 16"
      fill="none"
      stroke="currentColor"
      stroke-width="1.4"
      aria-hidden="true"
    >
      <circle cx="7" cy="7" r="4.5" />
      <path d="M10.5 10.5l3 3" stroke-linecap="round" />
    </svg>
    <input
      class="kp-search"
      type="search"
      [placeholder]="'koans.search-placeholder' | transloco"
      [value]="facade.query()"
      (input)="onQueryInput($event)"
      [attr.aria-label]="'koans.search-label' | transloco"
    />
    @if (facade.query()) {
      <button
        class="kp-search-clear"
        type="button"
        (click)="onClearQuery()"
        [attr.aria-label]="'koans.search-clear-label' | transloco"
      >
        ✕
      </button>
    }
  </div>

  <div class="kp-header-actions">
    <button
      tuiButton
      type="button"
      appearance="primary"
      size="s"
      iconStart="@tui.sparkles"
      (click)="onRandom()"
      [title]="'koans.sign-btn-title' | transloco"
    >
      {{ 'koans.sign-btn' | transloco }}
    </button>
  </div>
</header>

@if (facade.error(); as error) {
  <p class="kp-error" role="alert">{{ error | transloco }}</p>
}

<div class="kp-body">
  <button
    class="kp-list-toggle"
    type="button"
    [attr.aria-expanded]="listOpen()"
    aria-controls="koans-nav"
    (click)="onToggleList()"
  >
    @if (listOpen()) {
      {{ 'koans.list-hide' | transloco }}
    } @else {
      {{ 'koans.list-show' | transloco }}
    }
  </button>

  <nav
    id="koans-nav"
    class="kp-sidebar"
    [class.kp-sidebar--collapsed]="!listOpen()"
    [attr.aria-label]="'koans.nav-label' | transloco"
  >
    <ngKitty-koan-list
      [groups]="facade.groupedList()"
      [categories]="facade.categories()"
      [categoryCounts]="facade.categoryCounts()"
      [activeCategory]="facade.activeCategory()"
      [tagCounts]="facade.tagCounts()"
      [activeTags]="facade.activeTags()"
      [readSet]="facade.readSet()"
      [selectedSlug]="facade.selectedKoan()?.slug ?? null"
      [totalCount]="facade.koanList().length"
      [filteredCount]="facade.filteredList().length"
      [loading]="facade.loadingList()"
      [query]="facade.query()"
      (koanSelect)="onKoanSelect($event)"
      (categoryToggle)="onCategoryToggle($event)"
      (tagToggle)="onTagToggle($event)"
    />
  </nav>

  <main id="koans-main" class="kp-reader-wrap" tabindex="-1">
    <ngKitty-koan-reader
      [koan]="facade.selectedKoan()"
      [categories]="facade.categories()"
      [loading]="facade.loadingSelected()"
      [hasPrev]="hasPrev()"
      [hasNext]="hasNext()"
      (tagClick)="onTagToggle($event)"
      (prev)="onPrev()"
      (next)="onNext()"
      (share)="onShare()"
    />
  </main>
</div>

@if (toastMessage(); as toast) {
  <output class="kp-toast" aria-live="polite"><span class="kp-kanji">写</span>{{ toast }}</output>
}

<router-outlet />
