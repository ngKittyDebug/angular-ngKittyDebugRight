<a href="#koans-main" class="skip-link">Перейти к тексту коана</a>
<div class="koans-page">
  <h1 class="koans-title">Коаны</h1>
  @if (store.error(); as error) {
    <p class="koans-error" role="alert">{{ error }}</p>
  }
  <ngKitty-koan-widget [koan]="store.randomKoan()" [loading]="store.loadingRandom()" (next)="onNextKoan()" />
  <div class="koans-content">
    <button class="list-toggle" [attr.aria-expanded]="listOpen()" aria-controls="koans-nav" (click)="onToggleList()">
      @if (listOpen()) {
        Скрыть список
      } @else {
        Список коанов
      }
    </button>
    <nav id="koans-nav" class="koans-list" [class.koans-list--collapsed]="!listOpen()" aria-label="Список коанов">
      <ngKitty-koan-list
        [koanList]="store.koanList()"
        [loading]="store.loadingList()"
        [selectedSlug]="store.selectedKoan()?.slug ?? null"
        (koanSelect)="onKoanSelect($event)"
      />
    </nav>
    <main id="koans-main" class="koans-reader" tabindex="-1">
      <ngKitty-koan-reader [koan]="store.selectedKoan()" [loading]="store.loadingSelected()" />
    </main>
  </div>
</div>
