@if (tagCounts().length > 0) {
  <section class="kl-section">
    <div class="kl-label">
      <span>{{ 'koans.label-tags' | transloco }}</span>
      <span class="kl-label-kanji">標</span>
    </div>
    <div class="kl-tag-chips">
      @for (tc of visibleTags(); track tc[0]) {
        <button type="button" class="kl-tag" [class.is-on]="activeTags().has(tc[0])" (click)="onTag(tc[0])">
          {{ tc[0] }}
        </button>
      }
      @if (hiddenTagCount() > 0) {
        <button type="button" class="kl-tag kl-tag-more" (click)="toggleTagsExpanded()">
          @if (tagsExpanded()) {
            {{ 'koans.tags-collapse' | transloco }}
          } @else {
            {{ 'koans.tags-expand' | transloco: { count: hiddenTagCount() } }}
          }
        </button>
      }
    </div>
  </section>
}
