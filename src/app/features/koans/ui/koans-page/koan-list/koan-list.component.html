@if (store.loadingList()) {
  <p class="kl-status" aria-live="polite">{{ 'koans.list-loading' | transloco }}</p>
} @else {
  <div class="kl-scroll">
    <ngKitty-koan-category-filter
      [categories]="store.categories()"
      [categoryCounts]="store.categoryCounts()"
      [activeCategory]="store.activeCategory()"
      [totalCount]="store.totalCount()"
      (categoryToggle)="onCategoryToggle($event)"
    />

    <ngKitty-koan-tag-cloud
      [tagCounts]="store.tagCounts()"
      [activeTags]="store.activeTags()"
      (tagToggle)="onTagToggle($event)"
    />

    <ngKitty-koan-group-list
      [groups]="store.groupedList()"
      [categories]="store.categories()"
      [readSet]="store.readSet()"
      [selectedSlug]="store.selectedSlug()"
      [filteredCount]="store.filteredCount()"
      [query]="store.query()"
      (koanSelect)="koanSelect.emit($event)"
    />
  </div>
}
