@if (loading()) {
  <p class="kl-status" aria-live="polite">{{ 'koans.list-loading' | transloco }}</p>
} @else {
  <div class="kl-scroll">
    <ngKitty-koan-category-filter
      [categories]="categories()"
      [categoryCounts]="categoryCounts()"
      [activeCategory]="activeCategory()"
      [totalCount]="totalCount()"
      (categoryToggle)="categoryToggle.emit($event)"
    />

    <ngKitty-koan-tag-cloud
      [tagCounts]="tagCounts()"
      [activeTags]="activeTags()"
      (tagToggle)="tagToggle.emit($event)"
    />

    <ngKitty-koan-group-list
      [groups]="groups()"
      [categories]="categories()"
      [readSet]="readSet()"
      [selectedSlug]="selectedSlug()"
      [filteredCount]="filteredCount()"
      [query]="query()"
      (koanSelect)="koanSelect.emit($event)"
    />
  </div>
}
