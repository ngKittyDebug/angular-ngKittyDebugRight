@let response = result();
<ngKitty-tarot-oracle
  [isLoading]="isLoading()"
  [(role)]="currentRole"
  [(intent)]="currentIntent"
  (drawCardsClicked)="onDrawCards()"
/>
<section class="tarot-reading">
  @if (response) {
    <div class="tarot-verdict">
      <h2>{{ response.verdict_label }}</h2>
      <p>{{ response.verdict_text }}</p>
    </div>
    <div class="tarot-cards-container">
      @for (card of response.cards; track card.position) {
        <ngKitty-card
          class="tarot-card"
          [subtitle]="card.position_label"
          [title]="card.name"
          [description]="card.narrative"
          [badge]="card.position_label"
        />
      }
    </div>
  }
</section>
