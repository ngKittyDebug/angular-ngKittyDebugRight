<ngKitty-header />
<div class="layout">
  <ngKitty-sidebar
    [navigationItemList]="filteredNavigationItems()"
    [isMobileOpen]="isMobileNavOpen()"
    (navItemClicked)="onToggleMobileNav()"
  >
    @if (user(); as user) {
      <a
        class="profile-card"
        routerLink="/profile"
        routerLinkActive="active"
        aria-label="Open profile"
        (click)="onToggleMobileNav()"
      >
        <div tuiAvatar="@tui.user" size="m"></div>
        <div class="user-info">
          <div class="name">{{ user.userMetadata?.['full_name'] || user.email }}</div>
        </div>
      </a>
      <button appearance="primary" size="s" tuiButton type="button" class="exit" (click)="onLogout()">
        <tui-icon icon="@tui.log-out" />
        <span>{{ 'sidebar.exit' | transloco }}</span>
      </button>
    }
  </ngKitty-sidebar>
  @if (isMobileNavOpen()) {
    <div class="layout-sidebar-backdrop" role="presentation" (click)="onCloseMobileNav()"></div>
  }
  <main tuiNavigationMain class="main">
    <div class="main-toolbar">
      <button
        tuiButton
        type="button"
        appearance="outline"
        size="m"
        [attr.aria-expanded]="isMobileNavOpen()"
        (click)="onToggleMobileNav()"
      >
        <tui-icon icon="@tui.menu" />
      </button>
    </div>
    <div class="main-content">
      <router-outlet />
    </div>
  </main>
</div>
<ngKitty-footer />
