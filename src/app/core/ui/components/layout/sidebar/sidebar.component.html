<aside class="sidebar" [class.sidebar-mobile-open]="isMobileOpen()">
  <section class="section">
    <p class="section-title">[ {{ 'sidebar.navigation' | transloco }} ]</p>
    <nav class="nav" id="sidebar-nav">
      @for (navigationItem of navigationItemList(); track navigationItem.label) {
        <ngKitty-navigation-item [item]="navigationItem" />
      }
    </nav>
  </section>

  <div class="content">
    <ng-content />
    <a class="profile-card" routerLink="/profile" routerLinkActive="active" aria-label="Open profile">
      <div tuiAvatar="@tui.user" size="m"></div>
      <div class="user-info">
        <div class="name">RandomUser</div>
        <div class="role">Moscow</div>
      </div>
    </a>
  </div>
</aside>
