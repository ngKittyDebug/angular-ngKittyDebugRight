<div class="profile">

    <span>location: Moscow</span>
  </section>
  <section class="user-section">

      <tui-icon icon="@tui.trending-up" />

      </div>

        <span class="stats-value">0.0</span>

      </div>
      <div class="stats-item">
        <span class="stats-value">0</span>
        <span class="stats-name">Days of activity</span>

  <section class="user-section"></section>
