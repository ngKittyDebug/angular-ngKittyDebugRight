name: coverage

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: coverage-badge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:cov

      - name: Generate badges
        uses: jaywcjlove/coverage-badges-cli@main
        with:
          source: coverage/ngKittyDebugRight/coverage-summary.json
          output: badges/coverage.svg
          label: coverage
          jsonPath: total.lines.pct

      - name: Commit coverage badge
        env:
          HUSKY: '0'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f badges/
          git diff --staged --quiet || git commit --no-verify -m "docs: update coverage badges [skip ci]"
          git push --no-verify origin "HEAD:${{ github.event.pull_request.head.ref }}"
