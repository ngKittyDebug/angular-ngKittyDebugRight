name: Update PR Coverage Badge

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  update-pr-body:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Update coverage badge URL in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const coverageUrl = `https://raw.githubusercontent.com/${repo}/${pr.head.sha}/badges/coverage.svg`;
            const nextBadge = `![Coverage](${coverageUrl})`;
            const badgeRegex = /!\[Coverage\]\([^)]+\)/;
            const body = pr.body ?? '';

            if (!body.includes('## Coverage Status')) {
              core.info('Coverage section not found in PR body, skipping.');
              return;
            }

            const nextBody = badgeRegex.test(body) ? body.replace(badgeRegex, nextBadge) : `${body}\n\n${nextBadge}`;

            if (nextBody === body) {
              core.info('PR body is already up to date.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: nextBody,
            });
